# Simple workflow for deploying Angular app to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master   # or main – change if needed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: |
          npm run build -- \
            --configuration production \
            --base-href="/${{ github.event.repository.name }}/"

      # Create 404.html for routing support (copies index.html)
      - name: Create 404.html
        run: cp dist/Jeopardy/index.html dist/Jeopardy/404.html

      # Add .nojekyll to disable Jekyll processing
      - name: Add .nojekyll
        run: touch dist/Jeopardy/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Path to the build output folder
          path: './dist/Jeopardy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: |
          npm run build -- \
            --configuration production \
            --base-href="/${{ github.event.repository.name }}/"

      # DEBUG: List dist contents
      - name: List build output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== Looking for Jeopardy folder ==="
          if [ -d "dist/Jeopardy" ]; then
            echo "✅ dist/Jeopardy exists"
            ls -la dist/Jeopardy/
          else
            echo "❌ dist/Jeopardy not found"
          fi
          if [ -d "dist/Jeopardy/browser" ]; then
            echo "✅ dist/Jeopardy/browser exists"
            ls -la dist/Jeopardy/browser/
          fi

      # Determine the correct publish directory
      - name: Set publish directory
        id: publish-dir
        run: |
          if [ -d "dist/Jeopardy/browser" ]; then
            echo "dir=dist/Jeopardy/browser" >> $GITHUB_OUTPUT
          elif [ -d "dist/Jeopardy" ]; then
            echo "dir=dist/Jeopardy" >> $GITHUB_OUTPUT
          else
            echo "❌ Could not find build output directory"
            exit 1
          fi

      - name: Create 404.html
        run: cp ${{ steps.publish-dir.outputs.dir }}/index.html ${{ steps.publish-dir.outputs.dir }}/404.html

      - name: Add .nojekyll
        run: touch ${{ steps.publish-dir.outputs.dir }}/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.publish-dir.outputs.dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
